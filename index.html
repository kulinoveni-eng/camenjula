<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camjulia Live Chat</title>

<script src="//libtl.com/sdk.js"
        data-zone="10981703"
        data-sdk="show_10981703"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#071b24,#123847,#285d6f);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:380px;
  padding:30px 25px;
  border-radius:25px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(15px);
  box-shadow:0 20px 50px rgba(0,0,0,0.45);
  text-align:center;
  color:white;
  position:relative;
}

.popup{
  position:absolute;
  top:-15px;
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  color:#111;
  padding:10px 15px;
  border-radius:15px;
  font-size:13px;
  font-weight:bold;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  animation:pulse 1.8s infinite;
}

@keyframes pulse{
  0%{transform:translateX(-50%) scale(1);}
  50%{transform:translateX(-50%) scale(1.05);}
  100%{transform:translateX(-50%) scale(1);}
}

.icon{
  font-size:50px;
  margin-top:20px;
  margin-bottom:10px;
}

h1{
  font-size:34px;
  margin-bottom:8px;
}

.subtitle{
  opacity:.85;
  font-size:14px;
  margin-bottom:15px;
}

.badge{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(0,255,120,0.15);
  color:#7CFFB2;
  font-size:14px;
  margin-bottom:15px;
}

.timer{
  margin-top:12px;
  color:#FFD54F;
  font-weight:bold;
  font-size:15px;
}

.avatars{
  display:flex;
  justify-content:center;
  margin:14px 0;
  font-size:0;
}

.avatars img{
  width:54px;
  height:54px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid white;
  margin:0 -6px;
  box-shadow:0 6px 15px rgba(0,0,0,.35);
}

.waiting{
  font-size:14px;
  opacity:.9;
  margin-bottom:20px;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#ff2d55,#ff5e3a);
  color:white;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  animation:glow 1.5s infinite alternate;
}

@keyframes glow{
  from{
    box-shadow:0 0 15px rgba(255,75,75,.5);
  }
  to{
    box-shadow:0 0 35px rgba(255,75,75,.9);
  }
}
</style>
</head>

<body>

<div class="card">
<div class="popup">💋 CamenJulia sent you a message</div>

  <div class="icon">💬</div>
  <h1>Live Chat</h1>
  <p class="subtitle">Connect with someone instantly</p>

  <div class="badge">🟢 2,341 online now</div>

<div class="avatars">
  <img src="girl1.jpg">
  <img src="girl2.jpg">
  <img src="girl3.jpg">
</div>

<p class="waiting">💋 CamenJulia is waiting for you...</p>
  <div class="timer">⏳ Only <span id="count">27</span> seconds left</div>

  <br>

  <button onclick="startChat()">Start Chat</button>
</div>

<script>
let count = 27;
setInterval(() => {
  if(count > 3){
    count--;
    document.getElementById("count").innerText = count;
  }
}, 1000);

function startChat() {
  show_10981703('pop').then(() => {
    openMiniApp();
  }).catch(() => {
    openMiniApp();
  });
}

function openMiniApp() {
  window.location.href = "tg://resolve?domain=Camenjuliabot&appname=miniapp";

  setTimeout(() => {
    window.location.href = "https://t.me/Camenjuliabot/miniapp";
  }, 1200);
}
</script>

</body>
</html>
