<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CamenJulia Live Chat</title>

  <!-- Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Monetag Rewarded Interstitial -->
  <script src="//libtl.com/sdk.js" data-zone="10982953" data-sdk="show_10982953"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff4f9a, #7b2cff);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .app {
      width: 92%;
      max-width: 430px;
      background: rgba(0,0,0,0.35);
      border-radius: 28px;
      padding: 22px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .avatar {
      width: 115px;
      height: 115px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      margin-bottom: 12px;
    }

    h1 {
      margin: 8px 0 4px;
      font-size: 28px;
    }

    .online {
      color: #7cff9b;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .card {
      background: rgba(255,255,255,0.14);
      border-radius: 20px;
      padding: 16px;
      margin: 15px 0;
      font-size: 15px;
      line-height: 1.5;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #ff2f7d, #ff8a00);
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }

    button:active {
      transform: scale(0.98);
    }

    #chatBox {
      display: none;
      margin-top: 18px;
      text-align: left;
    }

    .msg {
      background: rgba(255,255,255,0.18);
      padding: 12px 14px;
      border-radius: 16px;
      margin-bottom: 10px;
      font-size: 15px;
    }

    .typing {
      color: #ffd6e8;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }

    .small {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 14px;
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- ប្តូរ avatar.jpg ទៅឈ្មោះរូបរបស់បង -->
    <img class="avatar" src="avatar.jpg" alt="CamenJulia">

    <h1>CamenJulia</h1>
    <div class="online">● Online now</div>

    <div class="card">
      💬 CamenJulia sent you a private message.<br>
      Tap Start Chat to unlock the conversation.
    </div>

    <button id="startBtn" onclick="startChatRewarded()">💬 Start Chat</button>

    <div id="chatBox">
      <div class="msg">CamenJulia: Hi baby 😘</div>
      <div class="msg">CamenJulia: I was waiting for you...</div>
      <div class="msg">CamenJulia: Send me a message now 💕</div>
      <div class="typing">CamenJulia is typing...</div>
    </div>

    <div class="small">Powered by Telegram Mini App</div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    function unlockChat() {
      document.getElementById("chatBox").style.display = "block";
      document.getElementById("startBtn").style.display = "none";
    }

    function startChatRewarded() {
      if (typeof show_10982953 !== "function") {
        alert("Ad loading... please try again.");
        return;
      }

      show_10982953("pop")
        .then(() => {
          unlockChat();
        })
        .catch(() => {
          alert("Ad not ready. Please try again.");
        });
    }
  </script>
</body>
</html>
