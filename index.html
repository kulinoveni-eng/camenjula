<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CamenJulia Live Chat</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="//libtl.com/sdk.js" data-zone="10982953" data-sdk="show_10982953"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(160deg, #0f4c5c, #123043);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 18px;
    }
    .box {
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.14);
      border-radius: 28px;
      padding: 28px 22px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(0,0,0,0.35);
    }
    .pill {
      background: white;
      color: #111;
      display: inline-block;
      padding: 12px 22px;
      border-radius: 999px;
      font-weight: bold;
      margin-bottom: 25px;
    }
    .icon { font-size: 70px; }
    h1 { font-size: 42px; margin: 14px 0 8px; }
    .sub { font-size: 18px; opacity: .85; }
    .online {
      display: inline-block;
      margin: 22px 0;
      padding: 12px 22px;
      border-radius: 999px;
      background: rgba(0,255,130,.18);
      color: #7cff9b;
      font-size: 20px;
      font-weight: bold;
    }
    .text { font-size: 19px; margin: 14px 0; }
    .time { color: #ffd45a; font-size: 22px; font-weight: bold; margin: 18px 0; }
    button {
      width: 100%;
      border: 0;
      border-radius: 20px;
      padding: 18px;
      font-size: 25px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #ff1f6d, #ff5b2e);
      box-shadow: 0 0 28px rgba(255,60,90,.65);
    }
    #chatBox { display: none; margin-top: 18px; }
    .msg {
      background: rgba(255,255,255,.18);
      padding: 13px;
      border-radius: 16px;
      margin: 10px 0;
      text-align: left;
      font-size: 17px;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="pill">🔥 CamenJulia is online now</div>

    <div id="mainBox">
      <div class="icon">💬</div>
      <h1>Live Chat</h1>
      <div class="sub">Connect with someone instantly</div>

      <div class="online">🟢 2,352 online now</div>

      <div class="text">💋 CamenJulia is waiting for you...</div>
      <div class="time">⌛ Only 18 seconds left</div>

      <button id="startBtn" onclick="startChatRewarded()">Start Chat</button>
    </div>

    <div id="chatBox">
      <h1>✅ Chat Unlocked</h1>
      <div class="msg">CamenJulia: Hi baby 😘</div>
      <div class="msg">CamenJulia: I was waiting for you...</div>
      <div class="msg">CamenJulia: Send me a message now 💕</div>
      <div class="time">CamenJulia is typing...</div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    function unlockChat() {
      document.getElementById("mainBox").style.display = "none";
      document.getElementById("chatBox").style.display = "block";
    }

    function startChatRewarded() {
      if (typeof show_10982953 !== "function") {
        alert("Ad loading... please try again.");
        return;
      }

      show_10982953("pop")
        .then(() => {
          unlockChat();
        })
        .catch(() => {
          unlockChat();
        });
    }
  </script>
</body>
</html>
