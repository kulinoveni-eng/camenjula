<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CamenJulia Live Chat</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="//libtl.com/sdk.js" data-zone="10982953" data-sdk="show_10982953"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0c4b5b, #092f3d);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .wrap {
      width: 100%;
      max-width: 430px;
      text-align: center;
    }
    .top-pill {
      background: white;
      color: #111;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 18px;
      display: inline-block;
      margin-bottom: -25px;
      position: relative;
      z-index: 2;
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
    }
    .card {
      background: rgba(255,255,255,.16);
      border-radius: 28px;
      padding: 55px 24px 28px;
      box-shadow: 0 18px 45px rgba(0,0,0,.35);
    }
    .icon { font-size: 78px; }
    h1 {
      font-size: 48px;
      margin: 18px 0 8px;
    }
    .sub {
      font-size: 20px;
      opacity: .85;
      margin-bottom: 22px;
    }
    .online {
      display: inline-block;
      background: rgba(0,255,130,.20);
      color: #86ff9f;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 22px;
      margin-bottom: 28px;
    }
    .avatars {
      margin: 8px 0 24px;
    }
    .avatars img {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: 4px solid white;
      object-fit: cover;
      margin-left: -14px;
      box-shadow: 0 8px 18px rgba(0,0,0,.35);
    }
    .avatars img:first-child { margin-left: 0; }
    .waiting {
      font-size: 20px;
      margin: 16px 0;
    }
    .timer {
      color: #ffd45a;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 24px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 20px;
      padding: 18px;
      font-size: 26px;
      font-weight: 900;
      color: white;
      background: linear-gradient(135deg, #ff1f6d, #ff5b2e);
      box-shadow: 0 0 30px rgba(255,60,90,.7);
    }
    #chatBox { display: none; }
    .chat {
      height: 330px;
      overflow-y: auto;
      background: rgba(0,0,0,.2);
      border-radius: 18px;
      padding: 12px;
      margin: 15px 0;
      text-align: left;
    }
    .msg {
      padding: 11px 13px;
      border-radius: 15px;
      margin: 9px 0;
      font-size: 16px;
    }
    .bot { background: rgba(255,255,255,.18); }
    .me { background: rgba(255,95,150,.55); text-align: right; }
    .inputRow { display: flex; gap: 8px; }
    input {
      flex: 1;
      border: 0;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      outline: none;
    }
    .sendBtn {
      width: 90px;
      font-size: 16px;
      padding: 14px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top-pill">💋 CamenJulia sent you a message</div>

    <div class="card">
      <div id="mainBox">
        <div class="icon">💬</div>
        <h1>Live Chat</h1>
        <div class="sub">Connect with someone instantly</div>

        <div class="online">🟢 <span id="onlineCount">2341</span> online now</div>

        <div class="girl">
          <img src="girl1.jpg">
          <img src="girl2.jpg">
          <img src="girl3.jpg">
        </div>

        <div class="waiting">💋 CamenJulia is waiting for you...</div>
        <div class="timer">⌛ Only <span id="countdown">25</span> seconds left</div>

        <button onclick="startChatRewarded()">Start Chat</button>
      </div>

      <div id="chatBox">
        <h1 style="font-size:32px;">✅ Chat Unlocked</h1>
        <div class="chat" id="messages">
          <div class="msg bot">CamenJulia: Hi baby 😘</div>
          <div class="msg bot">CamenJulia: I was waiting for you...</div>
          <div class="msg bot">CamenJulia: Send me a message now 💕</div>
        </div>

        <div class="inputRow">
          <input id="userInput" placeholder="Type message..." />
          <button class="sendBtn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    let sendCount = 0;

    // Online random
    function updateOnline() {
      const num = Math.floor(Math.random() * (2450 - 2280 + 1)) + 2280;
      document.getElementById("onlineCount").textContent = num.toLocaleString();
    }
    updateOnline();
    setInterval(updateOnline, 3000);

    // Countdown
    let timeLeft = 25;
    setInterval(() => {
      timeLeft--;
      if (timeLeft <= 0) timeLeft = 25;
      document.getElementById("countdown").textContent = timeLeft;
    }, 1000);

    function runAdThen(callback) {
      if (typeof show_10982953 !== "function") {
        callback();
        return;
      }
      show_10982953("pop").then(callback).catch(callback);
    }

    function unlockChat() {
      document.getElementById("mainBox").style.display = "none";
      document.getElementById("chatBox").style.display = "block";
    }

    function startChatRewarded() {
      runAdThen(unlockChat);
    }

    function addMessage(text, type) {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function botReply() {
      const replies = [
        "CamenJulia: Aww really? 😘",
        "CamenJulia: Tell me more baby 💕",
        "CamenJulia: I like chatting with you...",
        "CamenJulia: Wait… I have something for you 😍",
        "CamenJulia: Don’t leave yet..."
      ];
      setTimeout(() => {
        addMessage(replies[Math.floor(Math.random() * replies.length)], "bot");
      }, 800);
    }

    function sendMessage() {
      const input = document.getElementById("userInput");
      const text = input.value.trim();
      if (!text) {
        alert("Please type a message first.");
        return;
      }

      addMessage("You: " + text, "me");
      input.value = "";
      sendCount++;

      if (sendCount === 1 || sendCount % 3 === 1) {
        runAdThen(botReply);
      } else {
        botReply();
      }
    }
  </script>
</body>
</html>
