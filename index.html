<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camjulia Live Chat</title>

<script src="//libtl.com/sdk.js"
        data-zone="10981703"
        data-sdk="show_10981703"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#071b24,#123847,#285d6f);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:360px;
  padding:30px 25px;
  border-radius:25px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(15px);
  box-shadow:0 20px 50px rgba(0,0,0,0.45);
  text-align:center;
  color:white;
}

.icon{
  font-size:50px;
  margin-bottom:10px;
}

h1{
  font-size:34px;
  margin-bottom:8px;
}

.subtitle{
  opacity:.85;
  font-size:14px;
  margin-bottom:15px;
}

.badge{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(0,255,120,0.15);
  color:#7CFFB2;
  font-size:14px;
  margin-bottom:15px;
}

.avatars{
  font-size:32px;
  margin:12px 0;
}

.avatars span{
  margin:0 -5px;
}

.waiting{
  font-size:14px;
  opacity:.9;
  margin-bottom:20px;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#ff2d55,#ff5e3a);
  color:white;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  animation:glow 1.5s infinite alternate;
}

@keyframes glow{
  from{
    box-shadow:0 0 15px rgba(255,75,75,.5);
  }
  to{
    box-shadow:0 0 35px rgba(255,75,75,.9);
  }
}

button:active{
  transform:scale(0.98);
}
</style>
</head>

<body>

<div class="card">
  <div class="icon">💬</div>
  <h1>Live Chat</h1>
  <p class="subtitle">Connect with someone instantly</p>

  <div class="badge">🟢 2,341 online now</div>

  <div class="avatars">
    <span>👩</span>
    <span>👩‍🦰</span>
    <span>👱‍♀️</span>
  </div>

  <p class="waiting">Emily, Sofia, Anna are waiting...</p>

  <button onclick="startChat()">Start Chat</button>
</div>

<script>
function startChat() {
  show_10981703('pop').then(() => {
    window.location.href = "https://t.me/Camenjuliabot/miniapp";
  }).catch(() => {
    window.location.href = "https://t.me/Camenjuliabot/miniapp";
  });
}
</script>

</body>
</html>
